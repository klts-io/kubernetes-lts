      - name: Cache
        uses: actions/cache@v4
        env:
          cache-name: src
        with:
          path: |
            src
          key: ${{ runner.os }}-build-${{ env.cache-name }}-v1-32-13-lts-1
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}
      - name: Config Github
        run: |
          git config --global user.email "noreply@github.com"
          git config --global user.name "GitHub"
      - name: Install dependent
        run: |
          make dependent
      - name: Checkout to v1.32.13-lts.1
        run: |
          make v1.32.13-lts.1
      - name: Install etcd
        run: |
          make install-etcd
      - name: Test
        run: |
          make test

